<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bobcat Language School — Painel do Professor</title>
<meta name="theme-color" content="#D9793F">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<style>
  :root { --orange: #D9793F; --orange-dark: #C9622A; --cream: #FBEFE6; --cream-2: #F7F1EC; --ok:#2E8B57; --bad:#C0392B; }
  * { box-sizing: border-box; }
  body { font-family: "Segoe UI", Arial, sans-serif; background: #fdfaf7; margin: 0; color: #2b2b2b; }
  .wrap { max-width: 960px; margin: 0 auto; padding: 24px 20px 60px 20px; }
  .topbar { display:flex; align-items:center; gap:10px; border-bottom:3px solid var(--orange); padding-bottom:14px; margin-bottom:18px; }
  .topbar .brand { font-weight:800; font-size:19px; color:var(--orange-dark); }
  .topbar .brand small { display:block; font-weight:400; font-size:11.5px; color:#777; font-style:italic; }
  h2 { font-size: 18px; color: var(--orange-dark); margin: 6px 0 14px 0; }

  .notice {
    background: var(--cream); border:1px solid #EBC9AE; border-radius: 8px;
    padding: 12px 16px; font-size: 13px; margin-bottom: 18px;
  }
  .notice.error { background:#FBEAE8; border-color:#f0c2be; color:var(--bad); }

  table { width:100%; border-collapse: collapse; font-size: 13.5px; background:#fff; border-radius:10px; overflow:hidden; }
  th { background: var(--orange); color:#fff; text-align:left; padding:10px 12px; }
  td { padding: 10px 12px; border-bottom: 1px solid #eee; }
  tr:nth-child(even) td { background: var(--cream-2); }

  .pct-pill { padding: 3px 10px; border-radius: 20px; font-weight:700; font-size:12px; }
  .pct-good { background:#EAF7EF; color:#1e6b40; }
  .pct-mid { background:#FFF6E0; color:#9c7a12; }
  .pct-low { background:#FBEAE8; color:var(--bad); }

  .actions { margin-bottom: 16px; display:flex; gap:10px; align-items:center; }
  .btn { background: var(--orange); color:#fff; border:none; padding:10px 18px; border-radius:8px; font-weight:700; font-size:13.5px; cursor:pointer; }
  .btn:hover { background: var(--orange-dark); }
  .empty { text-align:center; color:#888; font-size:13.5px; padding: 40px 0; }
  .summary-row { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
  .summary-box { flex:1; min-width:140px; background:#fff; border:1px solid #eee; border-radius:10px; padding:12px; text-align:center; }
  .summary-box .num { font-size:20px; font-weight:800; color:var(--orange-dark); }
  .summary-box .label { font-size:11px; color:#777; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <img src="./icons/icon-192.png" alt="Bobcat" style="height:36px;">
    <div>
      <div class="brand">Painel do Professor(a)</div>
      <small>Bobcat Language School — progresso da turma</small>
    </div>
  </div>

  <div id="notice-slot"></div>

  <div id="content" style="display:none;">
    <div class="summary-row" id="summary-row"></div>

    <div class="actions">
      <button class="btn" onclick="loadData()">🔄 Atualizar dados</button>
    </div>

    <h2>Progresso por aluno e lição</h2>
    <div id="table-slot"></div>
  </div>
</div>

<script>
const LESSON_NAMES = {
  'verb-to-be': 'Verb To Be'
};

async function ensureClient() {
  const cfg = window.SUPABASE_CONFIG;
  const configured = cfg && cfg.url && cfg.anonKey && !cfg.url.includes('SEU-PROJETO');
  if (!configured) {
    showNotice('⚠️ O Supabase ainda não foi configurado em <code>config.js</code>. Sem isso, este painel não tem de onde puxar os dados da turma — ele só funciona com Supabase (não existe versão "local" do painel do professor, já que o objetivo aqui é ver todos os alunos juntos).', true);
    return null;
  }
  const client = window.supabase.createClient(cfg.url, cfg.anonKey);
  let { data: { session } } = await client.auth.getSession();
  if (!session) {
    const { error } = await client.auth.signInAnonymously();
    if (error) {
      showNotice('⚠️ Não foi possível conectar ao Supabase: ' + error.message, true);
      return null;
    }
  }
  return client;
}

function showNotice(html, isError) {
  const slot = document.getElementById('notice-slot');
  slot.innerHTML = '<div class="notice ' + (isError ? 'error' : '') + '">' + html + '</div>';
}

function pctClass(pct) {
  if (pct >= 80) return 'pct-good';
  if (pct >= 50) return 'pct-mid';
  return 'pct-low';
}

async function loadData() {
  const client = await ensureClient();
  if (!client) return;

  showNotice('🔄 Carregando dados da turma...');

  const { data: profiles, error: pErr } = await client.from('profiles').select('*');
  const { data: progress, error: gErr } = await client.from('progress').select('*');

  if (pErr || gErr) {
    showNotice('⚠️ Erro ao consultar o Supabase: ' + ((pErr && pErr.message) || (gErr && gErr.message)), true);
    return;
  }

  document.getElementById('notice-slot').innerHTML = '';
  document.getElementById('content').style.display = 'block';

  if (!profiles || profiles.length === 0) {
    document.getElementById('table-slot').innerHTML = '<div class="empty">Ainda não há alunos com perfil criado.</div>';
    document.getElementById('summary-row').innerHTML = '';
    return;
  }

  // resumo geral
  const totalStudents = profiles.length;
  const completedCount = (progress || []).filter(p => p.completed).length;
  const avgPct = progress && progress.length > 0
    ? Math.round(progress.reduce((sum, p) => sum + (p.total > 0 ? p.correct / p.total : 0), 0) / progress.length * 100)
    : 0;

  document.getElementById('summary-row').innerHTML = `
    <div class="summary-box"><div class="num">${totalStudents}</div><div class="label">alunos com perfil</div></div>
    <div class="summary-box"><div class="num">${completedCount}</div><div class="label">lições concluídas (total)</div></div>
    <div class="summary-box"><div class="num">${avgPct}%</div><div class="label">média geral de acertos</div></div>
  `;

  // tabela: uma linha por (aluno, lição concluída/tentada)
  const profileById = {};
  profiles.forEach(p => { profileById[p.id] = p; });

  let rows = [];
  (progress || []).forEach(g => {
    const profile = profileById[g.user_id];
    rows.push({
      name: profile ? profile.name : '(perfil não encontrado)',
      avatar: profile ? profile.avatar : '❓',
      level: profile ? profile.level : '-',
      lesson: LESSON_NAMES[g.lesson_id] || g.lesson_id,
      correct: g.correct,
      total: g.total,
      completed: g.completed,
      lastAttempt: g.last_attempt
    });
  });

  // alunos que criaram perfil mas ainda não tentaram nenhuma lição
  profiles.forEach(p => {
    const hasAny = (progress || []).some(g => g.user_id === p.id);
    if (!hasAny) {
      rows.push({ name: p.name, avatar: p.avatar, level: p.level, lesson: '(nenhuma lição iniciada)', correct: 0, total: 0, completed: false, lastAttempt: null });
    }
  });

  rows.sort((a, b) => a.name.localeCompare(b.name));

  let html = '<table><tr><th>Aluno</th><th>Nível</th><th>Lição</th><th>Pontuação</th><th>Status</th><th>Última tentativa</th></tr>';
  rows.forEach(r => {
    const pct = r.total > 0 ? Math.round((r.correct / r.total) * 100) : null;
    const pctLabel = pct === null ? '—' : (r.correct + '/' + r.total + ' (' + pct + '%)');
    const pctCls = pct === null ? '' : pctClass(pct);
    const statusLabel = r.completed ? '✓ Concluída' : (r.total > 0 ? 'Em andamento' : '—');
    const dateLabel = r.lastAttempt ? new Date(r.lastAttempt).toLocaleString('pt-BR') : '—';
    html += `<tr>
      <td>${r.avatar} ${r.name}</td>
      <td>${r.level}</td>
      <td>${r.lesson}</td>
      <td>${pct !== null ? '<span class="pct-pill ' + pctCls + '">' + pctLabel + '</span>' : '—'}</td>
      <td>${statusLabel}</td>
      <td>${dateLabel}</td>
    </tr>`;
  });
  html += '</table>';
  document.getElementById('table-slot').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
